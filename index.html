<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Portfolio Page</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #0f0f0f;
            color: white;
            font-family: Arial, sans-serif;
        }

        .hero {
            height: 80vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .hero h1 {
            color: #ff6f91;
        }

        /* Card with side heading */
        .custom-card {
            display: flex;
            background: #1a1a1a;
            border-radius: 15px;
            overflow: hidden;
            transition: 0.3s;
        }

        .custom-card:hover {
            transform: translateY(-8px);
        }

        /* Side Heading */
        .side-heading {
            writing-mode: vertical-rl;
            transform: rotate(180deg);
            padding: 15px;
            font-weight: bold;
            letter-spacing: 2px;
            text-align: center;
        }

        /* Different colors */
        .project { background: #ff6f91; }
        .tech { background: #00c9ff; }
        .soft { background: #38f9d7; }

        .card-content {
            padding: 20px;
            flex: 1;
        }

        h2 {
            text-align: center;
            margin-bottom: 40px;
            color: #ff6f91;
        }

    </style>
</head>

<body>

<!-- Hero -->
<section class="hero">
    <div>
        <h1>Hello I'm Dhanasri</h1>
        <p>First Year Student of Artificial interlligence and Machine learning | Web Developer | Creative Mind</p>
    </div>
</section>

<!-- Section -->
<div class="container">
    <h2>My Portfolio</h2>

    <div class="row g-4">

        <!-- Project -->
        <div class="col-md-4">
            <div class="custom-card">
                <div class="side-heading project">PROJECT</div>
                <div class="card-content">
                    <p>Gallery, Mini web project, Portfolio webpage</p>
                </div>
            </div>
        </div>

        <!-- Technical -->
        <div class="col-md-4">
            <div class="custom-card">
                <div class="side-heading tech">TECH</div>
                <div class="card-content">
                    <p>HTML frontend, Basic Machine Learning</p>
                </div>
            </div>
        </div>

        <!-- Soft Skills -->
        <div class="col-md-4">
            <div class="custom-card">
                <div class="side-heading soft">SKILLS</div>
                <div class="card-content">
                    <p>Communication, Leadership, Problem solving</p>
                </div>
            </div>
        </div>

    </div>
</div>

</body>
</html>
